<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biodata Agusto ebenezer</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif;}
body {
  background:linear-gradient(-45deg,#667eea,#764ba2,#f093fb,#f5576c);
  background-size:400% 400%;
  animation:gradient 15s ease infinite;
  min-height:100vh;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
@keyframes gradient {
 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
}
.card {
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:25px;
  padding:40px 30px;
  max-width:400px;
  width:100%;
  text-align:center;
  color:white;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  transition:0.3s;
}
.foto {
  width:120px; height:120px; border-radius:50%;
  border:4px solid white;
  object-fit:cover;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
h1 {font-size:28px; margin-bottom:5px;}
.typed {font-size:18px; color:#ffeaa7; height:25px; margin-bottom:20px;}
.bio {font-size:14px; line-height:1.6; margin-bottom:25px; opacity:0.9;}
.btn {
  background:white; color:#667eea; border:none;
  padding:12px 25px; border-radius:50px;
  font-weight:bold; cursor:pointer; margin:5px;
  transition:0.3s; font-size:14px;
}
.btn:hover {transform:scale(1.05); box-shadow:0 5px 20px rgba(255,255,255,0.4);}
.sosmed a {
  color:white; font-size:24px; margin:0 10px; text-decoration:none;
  transition:0.3s; display:inline-block;
}
.sosmed a:hover {transform:translateY(-5px);}
audio {display:none;}

/* ========== MODE DESKTOP ========== */
@media (min-width: 768px) {
 .card {
    max-width: 800px;
    padding: 50px 60px;
    display: flex;
    align-items: center;
    gap: 50px;
    text-align: left;
  }
 .foto {
    width: 180px;
    height: 180px;
    margin-bottom: 0;
    flex-shrink: 0;
  }
 .content {
    flex: 1;
  }
  h1 {font-size: 36px;}
 .typed {font-size: 22px;}
 .bio {font-size: 16px;}
 .btn {padding: 14px 30px; font-size: 16px;}
}
</style>
</head>
<body>

<div class="card">
  <img class="foto" src="https://i.pravatar.cc/300" alt="Foto Profil">

  <div class="content">
    <h1 id="nama">Yo, salam kenal!</h1>
    <div class="typed" id="typed"></div>
    <p class="bio">
      ya saya suka mie ayam😋<br>
      <br>
      "ingin punya keluarga harmonis"
    </p>

    <button class="btn" onclick="toggleMusic()">▶️ Play Musik</button>
    <button class="btn" onclick="alert('Makasih udah mampir!')">👋 Kenalan Yuk</button>

    <div class="sosmed" style="margin-top:20px;">
      <a href="#">🌕</a>
      <a href="#">🇮🇩</a>
      <a href="#">🌏</a>
    </div>
  </div>
</div>

<audio id="musik" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d1718f9523.mp3" type="audio/mpeg">
</audio>

<script>
// Animasi ketik nama
const teks = ["asli lombok", "asli mataram", "asli indonesia"];
let i=0, j=0, hapus=false;
function ketik(){
  let current = teks[i];
  document.getElementById('typed').innerHTML = current.substring(0,j) + '|';
  if(!hapus && j++ == current.length){hapus=true; setTimeout(ketik,2000); return;}
  if(hapus && j-- == 0){hapus=false; i=(i+1)%teks.length;}
  setTimeout(ketik, hapus?50:100);
}
ketik();

// Play/Pause musik
let play = false;
function toggleMusic(){
  let audio = document.getElementById('musik');
  let btn = event.target;
  if(!play){audio.play(); btn.innerHTML='⏸️ Pause Musik'; play=true;}
  else{audio.pause(); btn.innerHTML='▶️ Play Musik'; play=false;}
}
</script>

</body>
</html>
